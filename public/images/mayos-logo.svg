<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="none" role="img" aria-label="Mayo's Body Shop — Est. 1998">

  <!-- Paint gun icon -->
  <g transform="translate(8, 28)">
    <!-- Gun body -->
    <rect x="18" y="14" width="28" height="14" rx="3" fill="#E53E3E"/>
    <!-- Barrel -->
    <rect x="46" y="18" width="20" height="6" rx="2" fill="#111111"/>
    <!-- Handle -->
    <rect x="22" y="28" width="10" height="18" rx="3" fill="#111111"/>
    <!-- Trigger guard -->
    <path d="M22 28 Q18 38 22 46" stroke="#E53E3E" stroke-width="2" fill="none"/>
    <!-- Nozzle spray dots -->
    <circle cx="70" cy="18" r="2" fill="#E53E3E" opacity="0.8"/>
    <circle cx="75" cy="14" r="1.5" fill="#E53E3E" opacity="0.6"/>
    <circle cx="75" cy="22" r="1.5" fill="#E53E3E" opacity="0.6"/>
    <circle cx="80" cy="12" r="1" fill="#E53E3E" opacity="0.4"/>
    <circle cx="80" cy="24" r="1" fill="#E53E3E" opacity="0.4"/>
  </g>

  <!-- MAYO'S — large Oswald-style bold condensed -->
  <text
    x="100"
    y="52"
    font-family="Oswald, Arial Narrow, sans-serif"
    font-weight="700"
    font-size="42"
    letter-spacing="2"
    fill="#111111"
    text-anchor="start"
  >MAYO'S</text>

  <!-- Red underline bar -->
  <rect x="100" y="58" width="170" height="3" fill="#E53E3E"/>

  <!-- BODY SHOP — smaller tracked -->
  <text
    x="100"
    y="80"
    font-family="Oswald, Arial Narrow, sans-serif"
    font-weight="400"
    font-size="16"
    letter-spacing="6"
    fill="#555555"
    text-anchor="start"
  >BODY SHOP</text>

  <!-- Est. 1998 + phone — smallest -->
  <text
    x="100"
    y="98"
    font-family="DM Sans, Arial, sans-serif"
    font-weight="400"
    font-size="11"
    letter-spacing="1"
    fill="#E53E3E"
    text-anchor="start"
  >EST. 1998  ·  DALLAS, TX</text>

</svg>
